name: Publish Worker Package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bundle management workflows from Toolkit
        run: |
          set -euo pipefail
          # Match the official zip layout: the package contains actions/ (the instance's managing workflows).
          # deploy-lobster-burger.yml overwrites actions/ into the instance's .github/workflows/ on
          # every deploy/update of the core and commits it — this is the only auto-channel through
          # which existing instances pick up workflow updates (new command menu, update-llm-secret.yml, etc.).
          # The single source of truth is altShiftClawToolkit/installer/workflows, pulled at publish time.
          git clone --depth 1 https://github.com/jeffsia-blacksmith/altShiftClawToolkit.git /tmp/toolkit
          rm -rf actions
          mkdir -p actions
          cp -R /tmp/toolkit/installer/workflows/. actions/

      - name: Build package zip
        run: |
          mkdir -p _site
          cd "$(git rev-parse --show-toplevel)"

          # Create the zip package with the same structure as the original
          zip -r _site/github-claw-worker-package.zip \
            GitHubClawCore/ \
            Terraform/ \
            actions/

          # Generate manifest
          REVISION="$(git rev-parse HEAD)"
          VERSION="$(jq -r '.version' github-claw-worker-package.json)"
          PACKAGE_URL="https://jeffsia-blacksmith.github.io/altShiftClawCore/github-claw-worker-package.zip"

          jq -n \
            --arg version "$VERSION" \
            --arg revision "$REVISION" \
            --arg package_url "$PACKAGE_URL" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              version: $version,
              revision: $revision,
              package_url: $package_url,
              published_at: $published_at
            }' > _site/github-claw-worker-package.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
