name: Guardrails

on:
  push:
    branches: [main, "refactor/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    name: Build check + e2e guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build check (esbuild bundle, no overwrite)
        run: npm run check

      - name: E2e guardrails (/health, /github/webhook, CRUD round-trip)
        run: npm run test:guardrails